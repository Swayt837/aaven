    <rect x="210" y="0" width="170" height="54" rx="27" fill="#EFEDE6" stroke="#111" stroke-width="4"/>
    <text x="295" y="36" font-size="24" font-weight="800" text-anchor="middle" fill="#111">🍸 Bar</text>
    <rect x="400" y="0" width="220" height="54" rx="27" fill="#E8EDFC" stroke="#111" stroke-width="4"/>
    <text x="510" y="36" font-size="24" font-weight="800" text-anchor="middle" fill="#111">💼 Freelance</text>
  </g>
  <!-- phone mockup right -->
  <g transform="translate(820,120)">
    <rect x="0" y="0" width="300" height="430" rx="34" fill="#FCE7EF" stroke="#111" stroke-width="6"/>
    <circle cx="150" cy="80" r="40" fill="#fff" stroke="#111" stroke-width="5"/>
    <text x="150" y="95" font-size="40" text-anchor="middle">🎬</text>
    <rect x="40" y="150" width="220" height="56" rx="14" fill="#F0426B" stroke="#111" stroke-width="5"/>
    <text x="150" y="186" font-size="24" font-weight="800" text-anchor="middle" fill="#fff">Me soutenir</text>
    <rect x="40" y="220" width="220" height="56" rx="14" fill="#fff" stroke="#111" stroke-width="5"/>
    <text x="150" y="256" font-size="24" font-weight="800" text-anchor="middle" fill="#111">Ma chaîne</text>
    <rect x="40" y="290" width="220" height="56" rx="14" fill="#fff" stroke="#111" stroke-width="5"/>
    <text x="150" y="326" font-size="24" font-weight="800" text-anchor="middle" fill="#111">Mes produits</text>
